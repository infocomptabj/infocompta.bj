<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compte — InfoCompta</title>
  <style>
/* =============================================
   InfoCompta — Styles partagés
   Palette : blanc cassé, bleu marine, or doux
   ============================================= */

   @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');

   :root {
     --bg:        #f7f6f2;
     --surface:   #ffffff;
     --navy:      #1a2e4a;
     --navy-lt:   #2a4265;
     --gold:      #b8963e;
     --gold-lt:   #d4af6a;
     --text:      #1e1e1e;
     --muted:     #7a7a7a;
     --border:    #e2ddd6;
     --radius:    4px;
     --shadow:    0 2px 16px rgba(26,46,74,0.08);
     --transition: 0.2s ease;
   }
   
   *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
   
   html { scroll-behavior: smooth; }
   
   body {
     background: var(--bg);
     color: var(--text);
     font-family: 'DM Sans', sans-serif;
     font-weight: 400;
     font-size: 16px;
     line-height: 1.7;
     min-height: 100vh;
     display: flex;
     flex-direction: column;
   }
   
   /* ── HEADER ── */
   header {
     background: var(--navy);
     padding: 0 3rem;
     position: sticky;
     top: 0;
     z-index: 100;
     display: flex;
     align-items: center;
     justify-content: space-between;
     height: 64px;
     box-shadow: 0 1px 0 rgba(255,255,255,0.06);
   }
   
   .logo {
     font-family: 'Cormorant Garamond', serif;
     font-size: 1.55rem;
     font-weight: 700;
     color: #fff;
     text-decoration: none;
     letter-spacing: 0.02em;
   }
   
   .logo span { color: var(--gold-lt); }
   
   nav ul {
     list-style: none;
     display: flex;
     gap: 0.25rem;
   }
   
   nav ul li a {
     color: rgba(255,255,255,0.72);
     text-decoration: none;
     font-size: 0.82rem;
     font-weight: 500;
     letter-spacing: 0.07em;
     text-transform: uppercase;
     padding: 0.45rem 1rem;
     border-radius: var(--radius);
     transition: color var(--transition), background var(--transition);
     display: block;
   }
   
   nav ul li a:hover {
     color: #fff;
     background: rgba(255,255,255,0.08);
   }
   
   nav ul li a.active {
     color: var(--gold-lt);
     background: rgba(184,150,62,0.12);
   }
   
   /* ── MAIN ── */
   main { flex: 1; }
   
   /* ── FOOTER ── */
   footer {
     background: var(--navy);
     color: rgba(255,255,255,0.45);
     text-align: center;
     font-size: 0.78rem;
     padding: 1.4rem 2rem;
     letter-spacing: 0.05em;
   }
   
   footer strong { color: var(--gold-lt); font-weight: 500; }
   
   /* ── UTILITAIRES ── */
   .container {
     max-width: 1080px;
     margin: 0 auto;
     padding: 0 2.5rem;
   }
   
   .btn {
     display: inline-block;
     background: var(--gold);
     color: #fff;
     text-decoration: none;
     font-size: 0.82rem;
     font-weight: 500;
     letter-spacing: 0.08em;
     text-transform: uppercase;
     padding: 0.7rem 1.8rem;
     border-radius: var(--radius);
     transition: background var(--transition), transform var(--transition);
     border: none;
     cursor: pointer;
   }
   
   .btn:hover { background: var(--gold-lt); transform: translateY(-1px); }
   
   .btn-outline {
     background: transparent;
     border: 1.5px solid var(--navy);
     color: var(--navy);
   }
   
   .btn-outline:hover { background: var(--navy); color: #fff; }
   
   .section-label {
     font-size: 0.72rem;
     font-weight: 500;
     letter-spacing: 0.15em;
     text-transform: uppercase;
     color: var(--gold);
     margin-bottom: 0.6rem;
   }
   
   h1, h2, h3, h4 {
     font-family: 'Cormorant Garamond', serif;
     font-weight: 700;
     line-height: 1.2;
     color: var(--navy);
   }
   
   h1 { font-size: clamp(2rem, 4vw, 3rem); }
   h2 { font-size: clamp(1.6rem, 3vw, 2.2rem); }
   h3 { font-size: 1.3rem; }
   
   p { color: #444; }
   
   .card {
     background: var(--surface);
     border: 1px solid var(--border);
     border-radius: var(--radius);
     padding: 1.8rem;
     box-shadow: var(--shadow);
     transition: transform var(--transition), box-shadow var(--transition);
   }
   
   .card:hover {
     transform: translateY(-3px);
     box-shadow: 0 6px 28px rgba(26,46,74,0.13);
   }
   
   .divider {
     border: none;
     border-top: 1px solid var(--border);
     margin: 3rem 0;
   }
   
   /* ── PAGE HERO ── */
   .hero {
     background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lt) 100%);
     color: #fff;
     padding: 5rem 0 4.5rem;
     position: relative;
     overflow: hidden;
   }
   
   .hero::after {
     content: '';
     position: absolute;
     right: -80px;
     top: -80px;
     width: 400px;
     height: 400px;
     border-radius: 50%;
     background: rgba(184,150,62,0.08);
     pointer-events: none;
   }
   
   .hero .section-label { color: var(--gold-lt); }
   .hero h1 { color: #fff; margin-bottom: 1rem; }
   .hero p { color: rgba(255,255,255,0.72); font-size: 1.05rem; max-width: 560px; }
   .hero .actions { margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }
   
   /* ── PAGE HERO SMALL (sous-pages) ── */
   .hero-sm {
     background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lt) 100%);
     padding: 3rem 0;
     color: #fff;
   }
   .hero-sm h1 { color: #fff; font-size: clamp(1.6rem, 3vw, 2.2rem); }
   .hero-sm p { color: rgba(255,255,255,0.65); margin-top: 0.5rem; }
   
   /* ── GRILLES ── */
   .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
   .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; }
   
   /* ── ICON BADGE ── */
   .icon-badge {
     width: 44px; height: 44px;
     background: rgba(184,150,62,0.12);
     border-radius: 8px;
     display: flex; align-items: center; justify-content: center;
     font-size: 1.3rem;
     margin-bottom: 1rem;
   }
   
   /* ── FORMULAIRE ── */
   .form-group { margin-bottom: 1.3rem; }
   .form-group label {
     display: block;
     font-size: 0.8rem;
     font-weight: 500;
     letter-spacing: 0.06em;
     text-transform: uppercase;
     color: var(--navy);
     margin-bottom: 0.4rem;
   }
   .form-group input,
   .form-group textarea,
   .form-group select {
     width: 100%;
     background: var(--bg);
     border: 1.5px solid var(--border);
     color: var(--text);
     font-family: 'DM Sans', sans-serif;
     font-size: 0.9rem;
     padding: 0.65rem 0.9rem;
     border-radius: var(--radius);
     outline: none;
     transition: border-color var(--transition);
   }
   .form-group input:focus,
   .form-group textarea:focus,
   .form-group select:focus { border-color: var(--gold); }
   .form-group textarea { resize: vertical; min-height: 130px; }
   
   /* ── RESPONSIVE ── */
   @media (max-width: 720px) {
     header { padding: 0 1.2rem; }
     .logo { font-size: 1.2rem; }
     nav ul li a { padding: 0.4rem 0.6rem; font-size: 0.75rem; }
     .container { padding: 0 1.2rem; }
     .hero { padding: 3.5rem 0 3rem; }
   }
   
</style>
  <style>

    .detail-layout {
      display: grid;

      gap: 2rem;
      padding: 2.5rem 0 5rem;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar { position: sticky; top: 80px; display: flex; flex-direction: column; gap: 1rem; }

    .meta-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.6rem;
    }
    .meta-card h4 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;

    .meta-row { display: flex; flex-direction: column; gap: 0.65rem; }
    .meta-item { font-size: 0.82rem; }
    .meta-item .meta-key { color: var(--muted); font-size: 0.72rem; display: block; margin-bottom: 0.1rem; }
    .meta-item .meta-val { color: var(--text); font-weight: 500; }

    .badge-sens {
      display: inline-block;

      text-transform: uppercase;
    }
    .badge-D { background: rgba(26,46,74,0.08); color: var(--navy); }
    .badge-C { background: rgba(184,150,62,0.12); color: var(--gold); }
    .badge-DC { background: rgba(100,100,100,0.08); color: #555; }

    .nav-buttons { display: flex; flex-direction: column; gap: 0.5rem; }
    .nav-btn {
      display: block;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.55rem 1rem;

      text-decoration: none;

      border: 1.5px solid var(--border);

    }
    .nav-btn:hover { border-color: var(--navy); color: var(--navy); background: rgba(26,46,74,0.04); }
    .nav-btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
    .nav-btn.primary:hover { background: var(--navy-lt); }

    .comptes-lies-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.4rem; }
    .compte-tag {

      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--navy);
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .compte-tag:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

    /* ── CONTENU PRINCIPAL ── */
    .detail-content { display: flex; flex-direction: column; gap: 1.5rem; }

    .content-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .content-section-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 1rem 1.6rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .content-section-header .icon { font-size: 1rem; }
    .content-section-header h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--navy);
    }
    .content-section-body { padding: 1.4rem 1.6rem; }
    .content-section-body p { font-size: 0.9rem; line-height: 1.75; color: #333; }
    .content-section-body ul { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.4rem; }
    .content-section-body ul li { font-size: 0.83rem; color: #333; padding: 0.4rem 0.7rem; background: var(--bg); border-radius: 3px; border-left: 3px solid var(--border); line-height: 1.5; }

    /* Tableaux débit / crédit */
    .dc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .dc-col { }
    .dc-col-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      border-radius: 3px;
      margin-bottom: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .dc-title-debit { background: rgba(26,46,74,0.07); color: var(--navy); }
    .dc-title-credit { background: rgba(184,150,62,0.12); color: var(--gold); }
    .dc-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .dc-col ul li {
      font-size: 0.83rem;
      color: #333;
      padding: 0.45rem 0.7rem;
      background: var(--bg);
      border-radius: 3px;
      border-left: 3px solid var(--border);
      line-height: 1.5;
    }
    .dc-col.debit ul li { border-left-color: var(--navy); }
    .dc-col.credit ul li { border-left-color: var(--gold); }

    /* Références */
    .ref-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.3rem; }
    .ref-tag {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.25rem 0.75rem;
      background: rgba(26,46,74,0.06);
      color: var(--navy);
      border-radius: 3px;
      border: 1px solid rgba(26,46,74,0.12);
    }

    /* Pas de données */
    .no-data {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .no-data .no-data-icon { font-size: 3rem; margin-bottom: 1rem; }
    .no-data h2 { color: var(--muted); font-size: 1.3rem; margin-bottom: 0.5rem; }
    .no-data p { font-size: 0.88rem; }

    /* Hero detail */
    .hero-detail {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lt) 100%);
      padding: 2.5rem 0 2rem;
      position: relative;
      overflow: hidden;
    }
    .hero-detail::after {
      content: '';
      position: absolute; right: -60px; top: -60px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(184,150,62,0.07);
      pointer-events: none;
    }
    .hero-detail .breadcrumb {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 0.6rem;
      letter-spacing: 0.05em;
    }
    .hero-detail .breadcrumb a { color: rgba(255,255,255,0.55); text-decoration: none; }
    .hero-detail .breadcrumb a:hover { color: var(--gold-lt); }
    .hero-detail .code-badge {
      display: inline-block;
      font-family: 'Courier New', monospace;
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--gold-lt);
      line-height: 1;
      margin-bottom: 0.4rem;
    }
    .hero-detail h1 { color: #fff; font-size: clamp(1.1rem, 2.5vw, 1.6rem); margin-bottom: 0.3rem; }
    .hero-detail .classe-label { color: rgba(255,255,255,0.5); font-size: 0.8rem; }

    @media (max-width: 840px) {
      .detail-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .dc-grid { grid-template-columns: 1fr; }
    }
  
  /* ══════════════════════════════════════
     RESPONSIVE MOBILE — Menu hamburger
  ══════════════════════════════════════ */

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px 6px;
    background: none;
    border: none;
    z-index: 200;
    margin-left: auto;
    flex-shrink: 0;
  }
  .hamburger span {
    display: block;
    width: 26px;
    height: 2px;
    background: #fff;
    border-radius: 2px;
    transition: all 0.3s ease;
    transform-origin: center;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

<script src="comptes-data.js"></script>
<script>
  // Récupère le code depuis l'URL : compte-detail.html?code=101
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code') || '';
  const compte = comptesData[code];

  // Met à jour le titre de la page
  document.title = compte ? `Compte ${code} — InfoCompta` : `Compte introuvable — InfoCompta`;

  // ── HERO ──
  document.getElementById('breadCode').textContent = code || '?';
  document.getElementById('heroCode').textContent  = code || '?';

  if (compte) {
    document.getElementById('heroLibelle').textContent = compte.libelle;
    document.getElementById('heroClasse').textContent  = compte.classe || '';
    document.getElementById('metaNature').textContent  = compte.nature || '—';

    // Badge sens
    const sensEl = document.getElementById('metaSens');
    const s = (compte.sens || '').toLowerCase();
    const badgeClass = s.includes('débiteur') && s.includes('créditeur') ? 'DC'
                     : s.includes('débiteur') ? 'D' : 'C';
    sensEl.innerHTML = `<span class="badge-sens badge-${badgeClass}">${compte.sens}</span>`;

    // Comptes liés
    if (compte.comptes_lies && compte.comptes_lies.length) {
      document.getElementById('sideLies').style.display = 'block';
      const cl = document.getElementById('comptes-lies');
      compte.comptes_lies.forEach(c => {
        const a = document.createElement('a');
        a.href = `compte-detail.html?code=${c}`;
        a.className = 'compte-tag';
        a.textContent = c;
        cl.appendChild(a);
      });
    }

    // Références
    if (compte.textes_ref && compte.textes_ref.length) {
      document.getElementById('sideRef').style.display = 'block';
      const rl = document.getElementById('textes-ref');
      compte.textes_ref.forEach(r => {
        const span = document.createElement('span');
        span.className = 'ref-tag';
        span.textContent = r;
        rl.appendChild(span);
      });
    }

    // ── SECTIONS DE CONTENU ──
    const content = document.getElementById('detailContent');

    // 0. Contenu / Description
    if (compte.contenu) {
      content.appendChild(buildSection('📌', 'Contenu & Description',
        `<p>${compte.contenu}</p>`));
    }

    // 0b. Subdivisions
    if (compte.subdivisions && Object.keys(compte.subdivisions).length) {
      const rows = Object.entries(compte.subdivisions).map(([c,l]) =>
        `<div class="line" style="display:grid;grid-template-columns:90px 1fr;gap:1rem;padding:0.3rem 0.5rem;border-bottom:1px solid var(--border);">
          <a href="compte-detail.html?code=${c}" style="font-family:'Courier New',monospace;font-size:0.8rem;font-weight:600;color:var(--gold);text-decoration:none;">${c}</a>
          <span style="font-size:0.83rem;color:#333;">${l}</span>
        </div>`).join('');
      content.appendChild(buildSection('🗂', 'Subdivisions', rows));
    }

    // 1. Mouvements Débit / Crédit
    const fct = compte.fonctionnement || {};
    if ((fct.debit && fct.debit.length) || (fct.credit && fct.credit.length)) {
      const dcHTML = `
        <div class="dc-grid">
          <div class="dc-col debit">
            <div class="dc-col-title dc-title-debit">⬇ Débit (emplois)</div>
            <ul>${(fct.debit||[]).map(i=>`<li>${i}</li>`).join('')}</ul>
          </div>
          <div class="dc-col credit">
            <div class="dc-col-title dc-title-credit">⬆ Crédit (ressources)</div>
            <ul>${(fct.credit||[]).map(i=>`<li>${i}</li>`).join('')}</ul>
          </div>
        </div>`;
      content.appendChild(buildSection('🔁', 'Fonctionnement — Mouvements du compte', dcHTML));
    }

    // 2. Commentaires
    if (compte.commentaires) {
      const cText = compte.commentaires.replace(/\n/g, '<br><br>');
      content.appendChild(buildSection('💬', 'Commentaires & règles pratiques',
        `<p style="white-space:pre-line;">${cText}</p>`));
    }

    // 3. Exclusions
    if (compte.exclusions) {
      const exList = (compte.exclusions.comptes||[]).map(c=>`<li>${c}</li>`).join('');
      const exHTML = `<p style="margin-bottom:0.8rem;">${compte.exclusions.texte||''}</p>
        ${exList ? `<p style="font-size:0.78rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem;">Comptes à utiliser à la place :</p><ul>${exList}</ul>` : ''}`;
      content.appendChild(buildSection('🚫', 'Exclusions', exHTML));
    }

    // 4. Éléments de contrôle
    if (compte.controle && compte.controle.length) {
      const ctrlHTML = `<ul>${compte.controle.map(c=>`<li>${c}</li>`).join('')}</ul>`;
      content.appendChild(buildSection('✅', 'Éléments de contrôle', ctrlHTML));
    }

  } else {
    // ── PAS DE DONNÉES ──
    document.getElementById('heroLibelle').textContent = 'Compte non référencé';
    document.getElementById('heroClasse').textContent  = '';

    const content = document.getElementById('detailContent');
    content.innerHTML = `
      <div class="no-data">
        <div class="no-data-icon">🔍</div>
        <h2>Aucune fiche disponible</h2>
        <p>Le compte <strong>${code}</strong> n'a pas encore de fiche détaillée dans notre base.</p>
        <p style="margin-top:0.5rem;">Vous pouvez nous soumettre le contenu via la page Contact, nous l'intégrerons rapidement.</p>
        <div style="margin-top:1.5rem;display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
          <a href="plan-comptable.html" class="btn">← Retour au plan</a>
          <a href="contact.html" class="btn btn-outline">Nous contacter</a>
        </div>
      </div>`;
  }

  // ── HELPER ──
  function buildSection(icon, title, bodyHTML) {
    const sec = document.createElement('div');
    sec.className = 'content-section';
    sec.innerHTML = `
      <div class="content-section-header">
        <span class="icon">${icon}</span>
        <h3>${title}</h3>
      </div>
      <div class="content-section-body">${bodyHTML}</div>`;
    return sec;
  }
</script>

<script>
  (function() {
    var btn = document.getElementById('hamburgerBtn');
    var nav = document.querySelector('nav');
    if (!btn || !nav) return;

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var isOpen = nav.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
      btn.setAttribute('aria-expanded', isOpen);
    });

    // Fermer au clic sur un lien
    nav.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() {
        nav.classList.remove('open');
        btn.classList.remove('open');
      });
    });

    // Fermer au clic en dehors
    document.addEventListener('click', function(e) {
      if (!nav.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
        nav.classList.remove('open');
        btn.classList.remove('open');
      }
    });
  })();
</script>

</body>
</html>
