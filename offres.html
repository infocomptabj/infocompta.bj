<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nos Offres</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 2rem;
    }

    .section-header {
      margin-bottom: 1.5rem;
    }

    .section-header h2 {
      font-size: 24px;
      font-weight: 600;
      color: #111;
      margin-bottom: 6px;
    }

    .section-header p {
      font-size: 14px;
      color: #666;
    }

    .offers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .offer-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .offer-card:hover {
      border-color: #185FA5;
      box-shadow: 0 4px 12px rgba(24, 95, 165, 0.1);
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
      background: #E6F1FB;
      color: #0C447C;
      font-weight: 600;
      width: fit-content;
    }

    .offer-title {
      font-size: 14px;
      font-weight: 600;
      color: #111;
      line-height: 1.5;
    }

    .offer-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      flex: 1;
    }

    .offer-price {
      font-size: 22px;
      font-weight: 700;
      color: #111;
    }

    .offer-price span {
      font-size: 13px;
      color: #888;
      font-weight: 400;
    }

    .btn-buy {
      display: block;
      text-align: center;
      padding: 10px 0;
      border-radius: 8px;
      background: #185FA5;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-buy:hover {
      background: #0C447C;
    }
  </style>
</head>
<body>

  <div class="section-header">
    <h2>Nos offres</h2>
    <p>Téléchargement instantané après paiement sécurisé via FedaPay</p>
  </div>

  <div class="offers-grid" id="offersGrid"></div>

  <script>
    // =============================================
    // MODIFIEZ CE TABLEAU POUR GÉRER VOS DOCUMENTS
    // =============================================
    const offers = [
      {
        badge: "Juridique",
        title: "Modèle de contrat de travail CDI",
        price: "2 500",
        devise: "FCFA",
        desc: "Contrat conforme au droit béninois, prêt à personnaliser.",
        link: "https://LIEN-FEDAPAY-DOCUMENT-1.com"  // ← Remplacez par le vrai lien FedaPay
      },
      {
        badge: "Comptabilité",
        title: "Plan comptable OHADA commenté",
        price: "3 500",
        devise: "FCFA",
        desc: "Document complet avec notes explicatives et exemples pratiques.",
        link: "https://LIEN-FEDAPAY-DOCUMENT-2.com"  // ← Remplacez par le vrai lien FedaPay
      },
      {
        badge: "Business",
        title: "Template de plan d'affaires",
        price: "4 000",
        devise: "FCFA",
        desc: "Structure complète pour présenter votre projet à des investisseurs.",
        link: "https://LIEN-FEDAPAY-DOCUMENT-3.com"  // ← Remplacez par le vrai lien FedaPay
      },
      {
        badge: "Académique",
        title: "Guide de rédaction de mémoire",
        price: "1 500",
        devise: "FCFA",
        desc: "Méthodologie et modèles pour rédiger un mémoire de qualité.",
        link: "https://LIEN-FEDAPAY-DOCUMENT-4.com"  // ← Remplacez par le vrai lien FedaPay
      },
      {
        badge: "Immobilier",
        title: "Contrat de bail d'habitation",
        price: "2 000",
        devise: "FCFA",
        desc: "Modèle légal de contrat de location pour propriétaires et locataires.",
        link: "https://LIEN-FEDAPAY-DOCUMENT-5.com"  // ← Remplacez par le vrai lien FedaPay
      },
      {
        badge: "RH",
        title: "Kit de fiches de paie OHADA",
        price: "5 000",
        devise: "FCFA",
        desc: "Pack de 12 modèles mensuels avec calculs automatiques intégrés.",
        link: "https://LIEN-FEDAPAY-DOCUMENT-6.com"  // ← Remplacez par le vrai lien FedaPay
      }
    ];
    // =============================================

    const grid = document.getElementById('offersGrid');
    offers.forEach(o => {
      grid.innerHTML += `
        <div class="offer-card">
          <span class="badge">${o.badge}</span>
          <p class="offer-title">${o.title}</p>
          <p class="offer-desc">${o.desc}</p>
          <p class="offer-price">${o.price} <span>${o.devise}</span></p>
          <a class="btn-buy" href="${o.link}" target="_blank">Acheter &amp; Télécharger</a>
        </div>`;
    });
  </script>

</body>
</html>
