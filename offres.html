<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test FedaPay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #1a1a1a; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
    .amount {
      font-size: 2.5rem;
      font-weight: 700;
      color: #0F1F35;
      margin-bottom: 0.3rem;
    }
    .label {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 2rem;
    }
    button {
      width: 100%;
      padding: 1rem;
      background: #6D28D9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 0.8rem;
    }
    button:hover { background: #5b21b6; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .secure { font-size: 0.75rem; color: #999; }
    .log {
      margin-top: 1.5rem;
      background: #f8f8f8;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 1rem;
      text-align: left;
      font-size: 0.8rem;
      color: #444;
      max-height: 150px;
      overflow-y: auto;
    }
    .log-item { padding: 2px 0; border-bottom: 1px solid #eee; }
    .log-item:last-child { border-bottom: none; }
    .success { color: #2d7a4f; font-weight: 600; }
    .error { color: #c0392b; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Test FedaPay</h1>
    <p>Page de test indépendante pour vérifier l'intégration FedaPay</p>

    <div class="amount">100 FCFA</div>
    <div class="label">Paiement test · Sandbox</div>

    <button id="payBtn" onclick="testPay()">Payer 100 FCFA via FedaPay</button>
    <div class="secure">🔒 Mode Sandbox — Aucun vrai argent débité</div>

    <div class="log" id="log">
      <div class="log-item">En attente du clic...</div>
    </div>
  </div>

  <script>
    var logs = document.getElementById('log');

    function addLog(msg, type) {
      var d = document.createElement('div');
      d.className = 'log-item ' + (type || '');
      d.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
      logs.appendChild(d);
      logs.scrollTop = logs.scrollHeight;
    }

    function testPay() {
      var btn = document.getElementById('payBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Chargement SDK...';
      addLog('Clic détecté, chargement du SDK...');

      // Charger le SDK dynamiquement
      var script = document.createElement('script');
      script.src = 'https://cdn.fedapay.com/checkout.js?v=1.1.7';
      
      script.onload = function() {
        addLog('SDK chargé ✓', 'success');
        btn.textContent = '⏳ Ouverture...';

        setTimeout(function() {
          try {
            addLog('Appel FedaPay.init()...');
            FedaPay.init({
              public_key: 'pk_sandbox_xVqfrpqqgrLpNa9ZPumJOvvg',
              transaction: {
                amount: 100,
                description: 'Test paiement InfoCompta',
                currency: { iso: 'XOF' }
              },
              customer: { email: 'test@test.com' },
              onComplete: function(resp) {
                addLog('onComplete appelé: ' + resp.reason, 'success');
                if (resp.reason === FedaPay.DIALOG_DISMISSED) {
                  addLog('Paiement annulé par l\'utilisateur');
                } else {
                  addLog('✅ Paiement réussi !', 'success');
                }
                btn.disabled = false;
                btn.textContent = 'Payer 100 FCFA via FedaPay';
              }
            }).open();
            addLog('widget.open() appelé ✓', 'success');
          } catch(err) {
            addLog('ERREUR: ' + err.message, 'error');
            btn.disabled = false;
            btn.textContent = 'Payer 100 FCFA via FedaPay';
          }
        }, 300);
      };

      script.onerror = function() {
        addLog('ERREUR: SDK non chargé — vérifiez la connexion', 'error');
        btn.disabled = false;
        btn.textContent = 'Payer 100 FCFA via FedaPay';
      };

      document.head.appendChild(script);
    }
  </script>
</body>
</html>
