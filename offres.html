<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Test FedaPay</title>

  <!-- SDK FedaPay -->
  <script src="https://cdn.fedapay.com/checkout.js" defer></script>

  <style>
    body {
      font-family: Arial;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
    }

    button {
      padding: 15px 25px;
      font-size: 16px;
      cursor: pointer;
      background: #6D28D9;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<button onclick="pay()">Tester paiement FedaPay</button>

<script>
function pay() {
  if (!window.FedaPay) {
    alert("FedaPay non chargé !");
    return;
  }

  try {
    FedaPay.init({
      public_key: "pk_sandbox_xVqfrpqqgrLpNa9ZPumJOvvg",

      transaction: {
        amount: 1000,
        description: "Test paiement",
        currency: { iso: "XOF" }
      },

      customer: {
        email: "test@example.com"
      },

      onComplete: function (resp) {
        if (resp && resp.reason !== "DIALOG_DISMISSED") {
          alert("Paiement réussi !");
        } else {
          alert("Paiement annulé");
        }
      }
    }).open();

  } catch (e) {
    console.error(e);
    alert("Erreur FedaPay: " + e.message);
  }
}
</script>

</body>
</html>
