<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Plan Comptable — InfoCompta</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="infocompta-shared.css">
  <style>
:root { --gold-xs: rgba(196,147,58,0.12); }

/* ── TOOLBAR ── */
.pc-toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0.85rem 0;
  position: sticky;
  top: 66px;
  z-index: 90;
  box-shadow: 0 2px 8px rgba(15,31,53,0.04);
}
.pc-toolbar .container {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}
.pc-search {
  background: var(--cream);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  padding: 0.55rem 1rem;
  border-radius: var(--radius);
  outline: none;
  width: 280px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.pc-search:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(196,147,58,0.1);
}
.pc-search::placeholder { color: var(--muted); }

.class-tabs { display: flex; gap: 0.3rem; flex-wrap: wrap; }
.tab {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  padding: 0.3rem 0.8rem;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.15s;
}
.tab:hover  { border-color: var(--gold); color: var(--gold); }
.tab.active { background: var(--navy); border-color: var(--navy); color: #fff; }

/* ── LIGNES ── */
.pc-lines { padding: 1.5rem 0 4rem; }
.line {
  display: grid;
  grid-template-columns: 110px 1fr 28px;
  gap: 1rem;
  align-items: center;
  padding: 0.3rem 0.75rem;
  border-left: 2px solid transparent;
  transition: background 0.12s, border-color 0.12s;
  border-radius: 0 3px 3px 0;
}
.line:hover { background: var(--surface); border-left-color: var(--gold); }
.line.hidden { display: none; }

.info-btn {
  display: flex; align-items: center; justify-content: center;
  width: 24px; height: 24px;
  font-size: 0.75rem; border-radius: 50%;
  background: transparent; border: 1.5px solid var(--border);
  color: var(--muted); text-decoration: none;
  opacity: 0; transition: opacity 0.15s, background 0.15s, color 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.line:hover .info-btn { opacity: 1; }
.info-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

.line[data-level="1"] { margin-top: 2rem; padding-top: 0.65rem; padding-bottom: 0.65rem; border-top: 1px solid var(--border); }
.line[data-level="1"] .lcode  { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 700; color: var(--navy) !important; }
.line[data-level="1"] .llabel { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 700; color: var(--navy) !important; text-transform: uppercase; letter-spacing: 0.06em; }
.line[data-level="2"] { margin-top: 0.8rem; }
.line[data-level="2"] .lcode  { font-size: 0.88rem; font-weight: 600; color: var(--navy); }
.line[data-level="2"] .llabel { font-size: 0.85rem; font-weight: 600; color: var(--navy); text-transform: uppercase; letter-spacing: 0.04em; }
.line[data-level="3"] .lcode  { font-size: 0.83rem; color: var(--gold); font-weight: 600; }
.line[data-level="3"] .llabel { font-size: 0.83rem; color: var(--text); }
.line[data-level="4"] { padding-left: 1.2rem; }
.line[data-level="4"] .lcode  { font-size: 0.78rem; color: var(--muted) !important; }
.line[data-level="4"] .llabel { font-size: 0.78rem; color: #555; }
.line[data-level="5"] { padding-left: 2.4rem; }
.line[data-level="5"] .lcode  { font-size: 0.74rem; color: #bbb !important; }
.line[data-level="5"] .llabel { font-size: 0.74rem; color: #888; }
.lcode  { text-align: right; color: var(--muted); }
.llabel { color: var(--text); }
.count-bar { font-size: 0.75rem; color: var(--muted); text-align: right; margin-top: 2rem; letter-spacing: 0.05em; }
mark { background: rgba(196,147,58,0.18); color: var(--gold); padding: 0 1px; border-radius: 2px; }

/* ── IA WIDGET ── */
.ic-header { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lt) 100%); padding: 14px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.ic-header-logo { width: 38px; height: 38px; border-radius: 50%; background: var(--gold-xs); border: 1.5px solid var(--gold); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ic-header-logo svg { width: 18px; height: 18px; fill: var(--gold-lt); }
.ic-header-info { flex: 1; }
.ic-header-info h3 { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; }
.ic-header-info p  { font-size: 10.5px; color: var(--gold-lt); display: flex; align-items: center; gap: 5px; margin-top: 2px; }
.ic-online { width: 6px; height: 6px; background: #5c9e5c; border-radius: 50%; animation: ic-blink 2s infinite; }
@keyframes ic-blink { 0%,100%{opacity:1} 50%{opacity:.35} }
.ic-close { background: rgba(255,255,255,.1); border: none; color: rgba(255,255,255,.8); cursor: pointer; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background .2s; flex-shrink: 0; }
.ic-close:hover { background: rgba(255,255,255,.2); color: #fff; }
.ic-chips { padding: 9px 12px 8px; background: var(--cream); border-bottom: 1px solid var(--border); display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.ic-chips::-webkit-scrollbar { display: none; }
.ic-chip { flex-shrink: 0; padding: 4px 11px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-size: 11px; font-weight: 500; color: var(--navy); cursor: pointer; white-space: nowrap; transition: background .18s, color .18s, border-color .18s; }
.ic-chip:hover { background: var(--navy); color: var(--gold-lt); border-color: var(--navy); }
.ic-messages { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; background: #FAF9F5; }
.ic-messages::-webkit-scrollbar { width: 3px; }
.ic-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.ic-msg { display: flex; gap: 8px; animation: ic-up .28s ease; }
@keyframes ic-up { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:none} }
.ic-msg.user { flex-direction: row-reverse; }
.ic-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.ic-msg.ai   .ic-avatar { background: var(--navy); color: var(--gold-lt); font-family: 'Cormorant Garamond', serif; font-size: 14px; }
.ic-msg.user .ic-avatar { background: var(--gold); color: #fff; }
.ic-bubble { max-width: 80%; padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.65; }
.ic-msg.ai   .ic-bubble { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 3px; box-shadow: 0 1px 4px rgba(15,31,53,.06); }
.ic-msg.user .ic-bubble { background: var(--navy); color: rgba(255,255,255,.92); border-bottom-right-radius: 3px; }
.ic-bubble .ic-ctag { display: inline-block; font-family: 'Courier New', monospace; font-size: 11px; font-weight: 700; padding: 1px 6px; background: var(--gold-xs); border: 1px solid rgba(196,147,58,.3); border-radius: 3px; color: var(--gold); text-decoration: none; }
.ic-source { font-size: 10px; color: var(--muted); margin-top: 5px; display: flex; align-items: center; gap: 4px; }
.ic-source-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }
.ic-typing { display: flex; gap: 4px; padding: 10px 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; border-bottom-left-radius: 3px; width: fit-content; }
.ic-typing span { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: ic-bounce .9s infinite; }
.ic-typing span:nth-child(2) { animation-delay: .15s; }
.ic-typing span:nth-child(3) { animation-delay: .3s; }
@keyframes ic-bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-7px)} }
.ic-input-area { padding: 11px 13px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0; }
#ic-input { flex: 1; border: 1.5px solid var(--border); border-radius: 6px; padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); resize: none; outline: none; max-height: 100px; line-height: 1.5; background: var(--cream); transition: border-color .18s; }
#ic-input:focus { border-color: var(--gold); }
#ic-input::placeholder { color: var(--muted); }
#ic-send { width: 38px; height: 38px; flex-shrink: 0; border-radius: 6px; background: var(--navy); border: 1px solid var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .18s, background .18s; }
#ic-send:hover    { background: var(--navy-lt); transform: scale(1.06); }
#ic-send:disabled { opacity: .45; cursor: not-allowed; transform: none; }
#ic-send svg { width: 15px; height: 15px; fill: var(--gold-lt); }
.ic-footer { text-align: center; font-size: 9.5px; color: var(--muted); padding: 5px 0 7px; background: var(--surface); border-top: 1px solid rgba(0,0,0,.04); flex-shrink: 0; }
.ic-footer span { color: var(--gold); font-weight: 600; }

/* ── RESPONSIVE ── */
@media (max-width: 1023px) {
  .pc-toolbar { top: 58px !important; }
  .pc-toolbar .container { flex-direction: column; align-items: stretch; gap: 0.5rem; }
  .pc-search  { width: 100% !important; }
  .class-tabs { gap: 0.2rem; flex-wrap: wrap; }
  .tab  { font-size: 0.62rem; padding: 0.2rem 0.5rem; }
  .line { grid-template-columns: 75px 1fr 20px; gap: 0.3rem; padding: 0.2rem 0.3rem; }
  .pc-lines { padding: 1rem 0 3rem; }
}
  </style>
</head>

<div class="pc-lines">
